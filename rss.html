<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> RSS </title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family:  Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;

    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #3498db;
      display: inline-block;
      padding-bottom: 5px;
    }

    .site-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
        gap: 1rem;
    }

    .site-nav a {
      text-decoration: none;
      color: white;
      background-color: #3498db;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      display: block;
    }

    .site-nav a:hover {
      background-color: #2980b9;
      box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
    }

    
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1> RSS</h1>
    </header>
    
    <nav>
      <ul class="site-nav"> 
        <li><a href="udlp.xml"> RSS 1</a></li>
        <li><a href="udlp2.xml">RSS 2</a></li>
      </ul>                                     
    </nav>
  </div>

</body>
</html>
